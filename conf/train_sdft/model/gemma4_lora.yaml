# @package model

name: gemma4_lora
model_name: google/gemma-4-E2B-it
enable_thinking: false

from_pretrained:
  max_seq_length: 2048
  load_in_4bit: false
  fast_inference: false

peft:
  r: 16
  target_modules:
    - q_proj
    - k_proj
    - v_proj
    - o_proj
    - gate_proj
    - up_proj
    - down_proj
  lora_alpha: 32
  lora_dropout: 0.0
  bias: none
  use_gradient_checkpointing: false
  use_rslora: false
  loftq_config: null
